<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 640" fill="none" role="img" aria-label="SEO ranking demo preview">
  <rect width="1000" height="640" fill="#eef3fb"/>
  <!-- card -->
  <rect x="60" y="60" width="880" height="520" rx="24" fill="#ffffff"/>
  <rect x="92" y="96" width="220" height="18" rx="9" fill="#0b1f4d"/>
  <rect x="92" y="128" width="140" height="12" rx="6" fill="#0b1f4d" opacity="0.4"/>
  <!-- rank pill -->
  <rect x="760" y="92" width="148" height="48" rx="24" fill="#1f7fd6"/>
  <text x="834" y="123" font-family="sans-serif" font-size="22" font-weight="800" fill="#ffffff" text-anchor="middle">#1 RANK</text>
  <!-- grid lines -->
  <g stroke="#e1eaf7" stroke-width="2">
    <line x1="120" y1="220" x2="880" y2="220"/>
    <line x1="120" y1="300" x2="880" y2="300"/>
    <line x1="120" y1="380" x2="880" y2="380"/>
    <line x1="120" y1="460" x2="880" y2="460"/>
  </g>
  <!-- rising area + line -->
  <path d="M120 470 L260 430 L400 400 L540 320 L680 250 L820 180 L820 470 Z" fill="#1f7fd6" opacity="0.12"/>
  <path d="M120 470 L260 430 L400 400 L540 320 L680 250 L820 180" stroke="#1f7fd6" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <circle cx="120" cy="470" r="9" fill="#1f7fd6"/>
  <circle cx="260" cy="430" r="9" fill="#1f7fd6"/>
  <circle cx="400" cy="400" r="9" fill="#1f7fd6"/>
  <circle cx="540" cy="320" r="9" fill="#2563eb"/>
  <circle cx="680" cy="250" r="9" fill="#2563eb"/>
  <circle cx="820" cy="180" r="11" fill="#0ea5e0"/>
  <!-- keyword chips -->
  <rect x="120" y="510" width="150" height="34" rx="17" fill="#1f7fd6" opacity="0.12"/>
  <rect x="142" y="522" width="106" height="10" rx="5" fill="#1f7fd6"/>
  <rect x="286" y="510" width="180" height="34" rx="17" fill="#2563eb" opacity="0.12"/>
  <rect x="308" y="522" width="136" height="10" rx="5" fill="#2563eb"/>
  <rect x="482" y="510" width="130" height="34" rx="17" fill="#0ea5e0" opacity="0.14"/>
  <rect x="504" y="522" width="86" height="10" rx="5" fill="#0ea5e0"/>
  <!-- magnifier -->
  <circle cx="690" cy="520" r="22" stroke="#0b1f4d" stroke-width="6" fill="none" opacity="0.5"/>
  <line x1="706" y1="536" x2="724" y2="554" stroke="#0b1f4d" stroke-width="6" stroke-linecap="round" opacity="0.5"/>
  <rect x="788" y="600" width="150" height="28" rx="14" fill="#0b1f4d" opacity="0.08"/>
  <text x="863" y="619" font-family="sans-serif" font-size="14" font-weight="700" fill="#0b1f4d" opacity="0.5" text-anchor="middle">DEMO PREVIEW</text>
</svg>
