<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 640" fill="none" role="img" aria-label="Mobile app demo preview">
  <defs>
    <linearGradient id="appbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e7f0fb"/>
      <stop offset="1" stop-color="#eef3fb"/>
    </linearGradient>
  </defs>
  <rect width="1000" height="640" fill="url(#appbg)"/>
  <!-- floating phone -->
  <g>
    <rect x="380" y="60" width="240" height="500" rx="44" fill="#0b1f4d"/>
    <rect x="394" y="74" width="212" height="472" rx="34" fill="#ffffff"/>
    <rect x="462" y="86" width="76" height="14" rx="7" fill="#0b1f4d" opacity="0.15"/>
    <!-- app header -->
    <rect x="414" y="118" width="120" height="18" rx="9" fill="#0b1f4d"/>
    <circle cx="572" cy="127" r="16" fill="#1f7fd6"/>
    <!-- progress ring -->
    <circle cx="500" cy="220" r="56" stroke="#e1eaf7" stroke-width="14" fill="none"/>
    <circle cx="500" cy="220" r="56" stroke="#1f7fd6" stroke-width="14" fill="none" stroke-linecap="round" stroke-dasharray="264 352" transform="rotate(-90 500 220)"/>
    <text x="500" y="214" font-family="sans-serif" font-size="30" font-weight="800" fill="#0b1f4d" text-anchor="middle">72%</text>
    <text x="500" y="238" font-family="sans-serif" font-size="13" fill="#0b1f4d" text-anchor="middle" opacity="0.5">Goal</text>
    <!-- list rows -->
    <rect x="414" y="312" width="172" height="44" rx="14" fill="#f1f6fd"/>
    <circle cx="438" cy="334" r="11" fill="#1f7fd6"/>
    <rect x="460" y="328" width="96" height="12" rx="6" fill="#0b1f4d" opacity="0.35"/>
    <rect x="414" y="368" width="172" height="44" rx="14" fill="#f1f6fd"/>
    <circle cx="438" cy="390" r="11" fill="#2563eb"/>
    <rect x="460" y="384" width="80" height="12" rx="6" fill="#0b1f4d" opacity="0.35"/>
    <rect x="414" y="424" width="172" height="44" rx="14" fill="#f1f6fd"/>
    <circle cx="438" cy="446" r="11" fill="#0ea5e0"/>
    <rect x="460" y="440" width="108" height="12" rx="6" fill="#0b1f4d" opacity="0.35"/>
    <!-- bottom nav -->
    <rect x="414" y="492" width="172" height="40" rx="20" fill="#0b1f4d"/>
    <circle cx="446" cy="512" r="8" fill="#3aa0ee"/>
    <circle cx="500" cy="512" r="8" fill="#ffffff" opacity="0.5"/>
    <circle cx="554" cy="512" r="8" fill="#ffffff" opacity="0.5"/>
  </g>
  <!-- floating cards -->
  <g>
    <rect x="150" y="170" width="180" height="86" rx="18" fill="#ffffff"/>
    <rect x="174" y="194" width="60" height="10" rx="5" fill="#0b1f4d" opacity="0.4"/>
    <rect x="174" y="214" width="100" height="22" rx="7" fill="#1f7fd6"/>
  </g>
  <g>
    <rect x="670" y="320" width="180" height="86" rx="18" fill="#ffffff"/>
    <rect x="694" y="344" width="60" height="10" rx="5" fill="#0b1f4d" opacity="0.4"/>
    <rect x="694" y="364" width="100" height="22" rx="7" fill="#0ea5e0"/>
  </g>
  <rect x="820" y="600" width="150" height="28" rx="14" fill="#0b1f4d" opacity="0.08"/>
  <text x="895" y="619" font-family="sans-serif" font-size="14" font-weight="700" fill="#0b1f4d" opacity="0.5" text-anchor="middle">DEMO PREVIEW</text>
</svg>
